<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Singing Monsters — Remixes</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #0d0b1e;
            font-family: 'Nunito', sans-serif;
            color: #f0e8ff;
            overflow-x: hidden;
        }

        /* Starfield */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.15; transform: scale(1); }
            to   { opacity: 0.8;  transform: scale(1.4); }
        }

        /* Moon */
        .moon {
            position: fixed;
            top: 40px;
            right: 80px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fffde0, #f5c842);
            box-shadow: 0 0 40px #f5c84266, 0 0 80px #f5c84222;
            z-index: 0;
        }

        /* Floating notes */
        .notes-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .note {
            position: absolute;
            font-size: 22px;
            opacity: 0;
            animation: floatNote var(--dur, 8s) ease-in var(--delay, 0s) infinite;
            color: var(--clr, #b388ff);
        }
        @keyframes floatNote {
            0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
            15%  { opacity: 0.6; }
            85%  { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-180px) rotate(25deg); }
        }

        /* Layout */
        .wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3.5rem;
        }
        .eyebrow {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #9c7cff;
            margin-bottom: 0.6rem;
        }
        h1 {
            font-family: 'Lilita One', cursive;
            font-size: clamp(2.4rem, 7vw, 4.2rem);
            line-height: 1.1;
            background: linear-gradient(135deg, #f5c842 0%, #ff7eb3 50%, #7eb3ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 16px;
            color: #a08cc0;
            font-weight: 600;
        }

        /* Cards grid */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 560px;
        }

        .card {
            display: block;
            text-decoration: none;
            background: linear-gradient(145deg, #1e1640, #2a1a55);
            border: 1.5px solid #3d2b80;
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--glow, rgba(149,101,255,0.08));
            opacity: 0;
            transition: opacity 0.25s;
            border-radius: inherit;
        }
        .card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent, #9565ff);
            box-shadow: 0 12px 40px var(--shadow, rgba(149,101,255,0.35));
        }
        .card:hover::before { opacity: 1; }

        .card-icon {
            font-size: 42px;
            margin-bottom: 0.75rem;
            display: block;
            filter: drop-shadow(0 0 10px var(--accent, #9565ff));
        }
        .card-name {
            font-family: 'Lilita One', cursive;
            font-size: 1.6rem;
            color: #f0e8ff;
            margin-bottom: 0.3rem;
        }
        .card-tag {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent, #9565ff);
        }
        .card-arrow {
            display: inline-block;
            margin-top: 1rem;
            font-size: 20px;
            transition: transform 0.2s;
            color: var(--accent, #9565ff);
        }
        .card:hover .card-arrow { transform: translateX(5px); }

        /* Card color variants */
        .card:nth-child(1) {
            --accent: #ffb347;
            --glow: rgba(255,179,71,0.1);
            --shadow: rgba(255,179,71,0.3);
        }
        .card:nth-child(2) {
            --accent: #ff7eb3;
            --glow: rgba(255,126,179,0.1);
            --shadow: rgba(255,126,179,0.3);
        }

        /* Footer */
        footer {
            margin-top: 3.5rem;
            font-size: 13px;
            color: #5a4880;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="moon"></div>
<div class="notes-bg" id="notes"></div>

<div class="wrapper">
    <header class="header">
        <p class="eyebrow">♪ fan-made ♪</p>
        <h1>My Singing<br>Monsters</h1>
        <p class="subtitle">Remixes &amp; Covers</p>
    </header>

    <nav class="cards" aria-label="Remix pages">
        <a href="Liam.html" class="card">
            <span class="card-icon">🎸</span>
            <p class="card-name">Liam</p>
            <p class="card-tag">Remix</p>
            <span class="card-arrow">→</span>
        </a>
        <a href="Michael.html" class="card">
            <span class="card-icon">🎹</span>
            <p class="card-name">Michael</p>
            <p class="card-tag">Remix</p>
            <span class="card-arrow">→</span>
        </a>
    </nav>

    <footer>Made with ♥ for the monster island</footer>
</div>

<script>
    const starEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random() * 2.5 + 0.5;
        s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
        starEl.appendChild(s);
    }

    const noteEl = document.getElementById('notes');
    const noteChars = ['♩','♪','♫','♬','𝅗𝅥'];
    const colors = ['#b388ff','#ffb347','#ff7eb3','#7eb3ff','#c3f584'];
    for (let i = 0; i < 18; i++) {
        const n = document.createElement('div');
        n.className = 'note';
        n.textContent = noteChars[i % noteChars.length];
        n.style.cssText = `left:${Math.random()*95}%;bottom:${Math.random()*30}%;--dur:${(Math.random()*6+6).toFixed(1)}s;--delay:${(Math.random()*8).toFixed(1)}s;--clr:${colors[i%colors.length]}`;
        noteEl.appendChild(n);
    }
</script>
</body>
</html>
